services:
  code-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: local/code-server-antigravity:latest
    container_name: code-server
    user: "1001:1001"
    restart: always
    ports:
      - "8080:8080"
    environment:
      TZ: ${TZ:-Etc/UTC}
      LANG: ${LANG:-en_US.UTF-8}
      LANGUAGE: ${LANGUAGE:-en_US:en}
      LC_ALL: ${LC_ALL:-en_US.UTF-8}
      SHELL: /bin/bash
      EDITOR: vim
      VISUAL: vim
      PAGER: less
      TERM: xterm-256color
    volumes:
      - /home/ubuntu/ai_test:/home/ubuntu/project
      - /home/ubuntu/.codex:/home/ubuntu/.codex
      - /home/ubuntu/.config/code-server:/home/ubuntu/.config/code-server
      - /home/ubuntu/.local/share/code-server:/home/ubuntu/.local/share/code-server
      - /home/ubuntu/.gemini:/home/ubuntu/.gemini
      - /home/ubuntu/.npm:/home/ubuntu/.npm
      - /home/ubuntu/.cache:/home/ubuntu/.cache
    networks:
      fixed_net:
        ipv4_address: 172.18.0.10

networks:
  fixed_net:
    external: true
